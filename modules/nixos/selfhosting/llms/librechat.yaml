version: 1.3.5
cache: true
endpoints:
  custom:
    - name: "Requestly"
      apiKey: "${REQUESTLY_KEY}"
      baseURL: "https://router.requesty.ai/v1"
      iconURL: "https://app.requesty.ai/icons/icon-512x512.png"
      models:
        default: ["nebius/moonshotai/kimi-k2.5"]
        fetch: true
      titleConvo: true
      titleModel: "deepinfra/Qwen/Qwen3-32B"
      dropParams: ["stop"]
      modelDisplayLabel: "Requestly"

webSearch:
  searxngInstanceUrl: "http://localhost:7881"
  searchProvider: "searxng"

  firecrawlApiKey: "placeholder"
  scraperProvider: "firecrawl"

  jinaApiKey: "placeholder"
  rerankerType: "jina"

  scraperTimeout: 40000
  safeSearch: 1 # Options: 0 (OFF), 1 (MODERATE - default), 2 (STRICT)
