[core]
        pager = "delta"

[gpg]
        format = "openpgp"

[gpg "openpgp"]
        program = "gpg"

[init]
        defaultBranch = "main"

[interactive]
        diffFilter = "delta --color-only"

[push]
        autoSetupRemote = true

[user]
        email = "miniluz@miniluz.dev"
        name = "miniluz"

[merge]
        conflictStyle = "zdiff3"
