[package]
name = "webhook-notifier"
version = "0.1.0"
edition = "2024"

[dependencies]
chrono = "0.4.44"
clap = { version = "4.6.0", features = ["derive"] }
color-eyre = "0.6.5"
eyre = "0.6.12"
facet = { version = "0.44.3", features = ["chrono"] }
facet-json = "0.44.5"
facet-pretty = "0.44.4"
ureq = { version = "3.3.0", default-features = false, features = ["gzip", "multipart", "native-tls"] }
